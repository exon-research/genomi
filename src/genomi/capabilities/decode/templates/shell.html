<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genomi Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #1e1e1e;
      --border2: #282828;
      --text: #f5f5f5;
      --text2: #aaaaaa;
      --text3: #666666;
      --text4: #444444;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --amber: #f59e0b;
      --red: #ef4444;
      --mono: 'DM Mono', 'SF Mono', 'Fira Code', monospace;
      --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sidebar-w: 220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow: hidden; }

    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 10;
    }
    .sidebar-logo {
      padding: 20px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      object-fit: contain;
    }
    .sidebar-logo-text { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .sidebar-logo-version { font-size: 10px; color: var(--text4); font-family: var(--mono); margin-left: auto; }
    .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
    .sidebar-section-label {
      padding: 12px 12px 6px; font-size: 10px; font-weight: 600;
      color: var(--text4); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text3);
      transition: all 0.15s ease; border: 1px solid transparent;
    }
    .nav-item:hover { color: var(--text2); background: var(--surface2); }
    .nav-item.active { color: var(--text); background: var(--surface2); border-color: var(--border2); }
    .nav-icon { width: 18px; text-align: center; font-size: 14px; opacity: 0.7; flex-shrink: 0; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      background: var(--green); color: #000; padding: 1px 6px;
      border-radius: 10px; min-width: 18px; text-align: center;
    }
    .sidebar-footer {
      padding: 14px 16px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text4); line-height: 1.5;
    }
    .sidebar-footer .timestamp { font-family: var(--mono); font-size: 10px; color: var(--text4); display: block; margin-top: 6px; }

    .main { margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto; }
    .topbar {
      position: sticky; top: 0; z-index: 5;
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,10,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-title { font-size: 13px; color: var(--text3); font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text4); font-family: var(--mono);
    }
    .view-content { padding: 24px 28px 60px; max-width: 1200px; }
    .view-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .view-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    .view-subtitle { color: var(--text3); font-size: 13px; margin-top: 4px; }
    .header-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      background: #10b98110; border: 1px solid #10b98125;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .card-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 700; color: var(--text2);
    }
    .card-body { padding: 16px 18px; }
    .empty-body { padding: 20px 18px; color: var(--text3); font-size: 13px; line-height: 1.6; }
    .empty-body code { font-family: var(--mono); color: var(--text2); background: var(--surface2); padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); }
    .highlight-link { cursor: pointer; color: var(--green); font-size: 11px; font-weight: 600; transition: color 0.15s ease; }
    .highlight-link:hover { color: var(--text); }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; font-family: var(--mono); }
    .stat-label { color: var(--text2); font-size: 12px; font-weight: 600; margin-top: 4px; }
    .stat-sub { color: var(--text4); font-size: 11px; margin-top: 2px; font-family: var(--mono); }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

    .badge {
      display: inline-flex; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; border: 1px solid;
      white-space: nowrap; text-transform: capitalize;
    }
    .genotype-badge {
      display: inline-flex; padding: 2px 7px; border-radius: 5px;
      font-size: 11px; font-family: var(--mono); font-weight: 500;
      background: #1a1a1a; color: var(--text2); white-space: nowrap;
    }

    .source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .source-item { padding: 12px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); }

    .variant-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .variant-table th {
      text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
      color: var(--text4); text-transform: uppercase; letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .variant-table td { padding: 10px 14px; border-bottom: 1px solid #141414; vertical-align: middle; }
    .variant-table tr:hover td { background: #0d0d0d; }
    .mono-text { font-family: var(--mono); font-size: 12px; color: var(--text3); }

    .pgx-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pgx-card {
      padding: 16px; border-radius: 10px; background: var(--surface);
      border: 1px solid var(--border);
    }
    .drug-chip {
      padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500;
      background: #1a1a1a; color: var(--text3); border: 1px solid var(--border);
    }

    .risk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .risk-card { padding: 16px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); }

    .nutri-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .nutri-card { padding: 16px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); }

    .journal-list { display: flex; flex-direction: column; }
    .journal-entry { display: flex; gap: 14px; }
    .journal-timeline {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 2px; width: 28px; flex-shrink: 0;
    }
    .journal-icon {
      width: 28px; height: 28px; border-radius: 8px;
      border: 2px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text3); flex-shrink: 0;
    }
    .journal-line { flex: 1; width: 1px; background: var(--border); margin: 4px 0; min-height: 20px; }
    .journal-body { flex: 1; padding-bottom: 20px; }
    .tag-chip {
      padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 500;
      background: var(--surface2); color: var(--text4); border: 1px solid var(--border);
      font-family: var(--mono);
    }

    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .risk-grid { grid-template-columns: repeat(2, 1fr); }
      .source-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .pgx-grid, .nutri-grid { grid-template-columns: 1fr; }
      .risk-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .source-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>window.__GENOMI_DASHBOARD__ = __GENOMI_EVIDENCE__;</script>

  <!-- Vendored React + ReactDOM (production UMD) inlined at render time —
       no CDN, no in-browser Babel. The dashboard UI is authored in
       dashboard.jsx and precompiled to vendor/dashboard.compiled.js by
       scripts/build_dashboard.py; both vendor scripts and the compiled app
       are spliced in by dashboard.py. The page renders fully offline. -->
  __GENOMI_VENDOR_SCRIPTS__

  <script>__GENOMI_APP_JS__</script>
</body>
</html>
