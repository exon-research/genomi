name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install genomics CLI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends samtools bcftools minimap2 tabix
          command -v samtools
          command -v bcftools
          command -v minimap2
          command -v bgzip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv lock --locked
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: src:.
        run: python -m pytest -q
